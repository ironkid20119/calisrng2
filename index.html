<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calis RNG game</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #4a148c;
            color: #ffffff;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff;
        }
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        #terminal {
            background-color: #2d0051;
            border: 2px solid #ff69b4;
            border-radius: 5px;
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .output-line {
            margin: 5px 0;
        }
        .command {
            color: #ff69b4;
        }
        .welcome-message {
            color: #ff69b4;
            font-weight: bold;
        }
        .stats {
            background-color: #2d0051;
            border: 2px solid #ff69b4;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .stat-item {
            margin: 8px 0;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            background-color: #808080;
            color: #ffffff;
            border: 2px solid #ff69b4;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #a0a0a0;
        }
        button:active {
            transform: scale(0.95);
        }
        button.active {
            background-color: #ff69b4;
            color: #000;
        }
        #inventory, #index {
            background-color: #2d0051;
            border: 2px solid #ff69b4;
            border-radius: 5px;
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }
        .inventory-item {
            background-color: #4a148c;
            border: 1px solid #ff69b4;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .inventory-item:hover {
            background-color: #5a1a9c;
            transform: translateX(5px);
        }
        .section-header {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ff69b4;
            font-weight: bold;
        }
        .clickable-roll {
            cursor: pointer;
            display: inline-block;
            transition: all 0.2s;
        }
        .clickable-roll:hover {
            transform: scale(1.05);
            text-shadow: 0 0 10px currentColor;
        }
        .index-item {
            background-color: #4a148c;
            border: 1px solid #ff69b4;
            padding: 8px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .index-item.discovered {
            border-color: #00ff00;
        }
        .index-item.locked {
            opacity: 0.5;
            border-color: #666;
        }
        
        .autoroll-settings {
            background-color: #2d0051;
            border: 2px solid #ff69b4;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .autoroll-setting-item {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .autoroll-setting-item label {
            flex-shrink: 0;
        }
        
        .autoroll-setting-item input[type="number"] {
            background-color: #4a148c;
            color: #ffffff;
            border: 1px solid #ff69b4;
            padding: 5px 10px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            width: 150px;
        }
        
        .autoroll-setting-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        /* Rank colors */
        .rank-1-1000 { color: #ffffff; }
        .rank-1000-10000 { color: #ffff00; }
        .rank-10000-100000 { color: #00ffff; }
        .rank-100000-1000000 { color: #0000cd; }
        .rank-1000000-100000000 { color: #ff0000; }
        .rank-100000000-1000000000 { color: #8b0000; }
        .rank-1000000000-100000000000 { color: #00ff00; }
        .rank-100000000000-1000000000000 { color: #00ff00; }
        .rank-1000000000000-100000000000000 { color: #ff69b4; }
        .rank-rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow-shift 3s linear infinite;
            background-size: 200% 100%;
        }
        
        @keyframes rainbow-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>calis RNG game</h1>
    
    <div class="stats">
        <div class="stat-item">Currency: <span id="currency">0.00</span></div>
        <div class="stat-item">Total Upgrades: <span id="upgrades">0</span></div>
        <div class="stat-item">Luck: +<span id="luck">0.000</span></div>
        <div class="stat-item">Secret Luck: <span id="secretLuck">1.00</span>x</div>
        <div class="stat-item">Variant Chance: <span id="variantChance">1.00</span>x</div>
        <div class="stat-item">Next Upgrade Cost: <span id="upgradeCost">50.00</span></div>
        <div class="stat-item">Inventory: <span id="inventoryCount">0</span>/<span id="inventoryMax">10</span></div>
        <div class="stat-item">Rarest Roll: <span id="rarest">None yet</span></div>
        <div class="stat-item">Ranks Discovered: <span id="ranksDiscovered">0</span>/<span id="totalRanks">25</span></div>
    </div>

    <div class="autoroll-settings">
        <div class="section-header">Auto Roll Settings</div>
        <div class="autoroll-setting-item">
            <label>Stop on rank ≥:</label>
            <input type="number" id="autoStopThreshold" value="0" step="0.000001" placeholder="Enter minimum value">
        </div>
        <div class="autoroll-setting-item">
            <input type="checkbox" id="secretConfig">
            <label for="secretConfig">Secret Config (stop on secret ranks)</label>
        </div>
    </div>

    <div class="controls">
        <button onclick="roll()">Roll (r)</button>
        <button id="autoRollBtn" onclick="toggleAutoRoll()">Auto Roll</button>
        <button onclick="buyUpgrade()">Buy Upgrade</button>
        <button onclick="showRarest()">Show Rarest</button>
        <button onclick="clearTerminal()">Clear Terminal</button>
        <button onclick="saveGame()">Save Game</button>
    </div>

    <div class="main-container">
        <div>
            <div id="terminal"></div>
        </div>
        <div>
            <div id="inventory">
                <div class="section-header">Inventory</div>
                <div id="inventoryContent">Empty</div>
            </div>
        </div>
        <div>
            <div id="index">
                <div class="section-header">Index (Ranks Discovered)</div>
                <div id="indexContent">Roll to discover ranks!</div>
            </div>
        </div>
    </div>

    <script>
        const POWER_EXPONENT = -2.5;
        const AUTO_ROLL_DELAY_MS = 30;
        const UPGRADE_COST_MULTIPLIER = 1.365;
        const LUCK_PER_UPGRADE = 0.777;
        const INVENTORY_PER_UPGRADE = 5;
        const VARIANT_CHANCE_PER_UPGRADE = 0.05;
        const MAX_VARIANT_CHANCE_MULTIPLIER = 2.5;
        const SECRET_LUCK_PER_UPGRADE = 0.25;
        const MAX_SECRET_LUCK = 3;

        const VARIANTS = [
            { name: "Shiny", chance: 1/100, multiplier: 25, color: "#FFD700" },
            { name: "Gilded", chance: 1/500, multiplier: 125, color: "#FFA500" },
            { name: "Spectral", chance: 1/2500, multiplier: 625, color: "#9400D3" },
            { name: "Extraordinary", chance: 1/5000, multiplier: 1250, color: "#FF1493" },
            { name: "Myriad", chance: 1/10000, multiplier: 2500, color: "#00FFFF" }
        ];

        let currency = 0;
        let totalUpgrades = 0;
        let upgradeCost = 50;
        let highestRoll = 0;
        let autoRollInterval = null;
        let maxInventory = 10;
        let inventory = [];
        let rollIndex = 1;
        let acceptedRolls = new Set();
        let discoveredRanks = new Set();
        let autoStopThreshold = 0;
        let secretConfig = false;

        const RANK_TIERS = [
            { min: 1, max: 5, name: "Common" },
            { min: 5, max: 25, name: "Natural" },
            { min: 25, max: 50, name: "Uncommon" },
            { min: 50, max: 100, name: "Normal" },
            { min: 100, max: 500, name: "Divine" },
            { min: 500, max: 1000, name: "Grandiose" },
            { min: 1000, max: 2500, name: "Decent" },
            { min: 2500, max: 7500, name: "Unreal" },
            { min: 7500, max: 25000, name: "Cosmic" },
            { min: 25000, max: 100000, name: "Eternal" },
            { min: 100000, max: 1e6, name: "Iridescent" },
            { min: 1e6, max: 1e7, name: "Heavenly" },
            { min: 1e7, max: 5e7, name: "Unattainable" },
            { min: 5e7, max: 1e9, name: "Gigantic" },
            { min: 1e9, max: 1e10, name: "Infinitude" },
            { min: 1e10, max: 1e12, name: "Unseeable" },
            { min: 1e12, max: 1e15, name: "Unrollable" },
            { min: 1e15, max: 1e18, name: "Imaginary" },
            { min: 1e18, max: 1e21, name: "Impossible" },
            { min: 1e21, max: 1e24, name: "Astronomical" },
            { min: 1e24, max: Infinity, name: "Colossal" }
        ];

        const SECRET_RANKS = ["nil", "In im table ?!?!?", "cheese", "cali^2"];
        const TOTAL_RANKS = RANK_TIERS.length + SECRET_RANKS.length;

        function getVariant() {
            const variantChanceMultiplier = Math.min(1 + (totalUpgrades * VARIANT_CHANCE_PER_UPGRADE), MAX_VARIANT_CHANCE_MULTIPLIER);
            
            // Check variants from rarest to most common
            for (let i = VARIANTS.length - 1; i >= 0; i--) {
                const variant = VARIANTS[i];
                const adjustedChance = variant.chance * variantChanceMultiplier;
                if (Math.random() < adjustedChance) {
                    return variant;
                }
            }
            return null;
        }

        function generateRoll() {
            const luck = totalUpgrades * LUCK_PER_UPGRADE;
            const baseRoll = Math.pow(Math.random(), 3 / POWER_EXPONENT) * (1 + luck);
            
            const variant = getVariant();
            if (variant) {
                return { value: baseRoll * variant.multiplier, variant: variant };
            }
            
            return { value: baseRoll, variant: null };
        }

        function applySecretRank(rankName) {
            const secretLuckMultiplier = Math.min(1 + (totalUpgrades * SECRET_LUCK_PER_UPGRADE), MAX_SECRET_LUCK);
            const rand = Math.random();
            if (rand < (1/1e12) * secretLuckMultiplier) return "cali^2";
            if (rand < (1/10000) * secretLuckMultiplier) return "cheese";
            if (rand < (1/7500) * secretLuckMultiplier) return "In im table ?!?!?";
            if (rand < (1/1000) * secretLuckMultiplier) return "nil";
            return rankName;
        }

        function getRankInfo(value) {
            for (let tier of RANK_TIERS) {
                if (value >= tier.min && value < tier.max) {
                    return { name: tier.name, value: value };
                }
            }
            return { name: "Unknown", value: value };
        }

        function getRankClass(value) {
            if (value >= 1e15) return "rank-rainbow";
            if (value >= 1e12) return "rank-1000000000000-100000000000000";
            if (value >= 1e11) return "rank-100000000000-1000000000000";
            if (value >= 1e9) return "rank-1000000000-100000000000";
            if (value >= 1e8) return "rank-100000000-1000000000";
            if (value >= 1e6) return "rank-1000000-100000000";
            if (value >= 1e5) return "rank-100000-1000000";
            if (value >= 10000) return "rank-10000-100000";
            if (value >= 1000) return "rank-1000-10000";
            return "rank-1-1000";
        }

        function getRankNumber(value) {
            for (let i = 0; i < RANK_TIERS.length; i++) {
                if (value >= RANK_TIERS[i].min && value < RANK_TIERS[i].max) {
                    return i + 1;
                }
            }
            return RANK_TIERS.length;
        }

        function addToTerminal(text, isCommand = false, className = "") {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'output-line';
            if (isCommand) line.classList.add('command');
            if (className) line.classList.add(className);
            line.innerHTML = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateStats() {
            document.getElementById('currency').textContent = currency.toFixed(2);
            document.getElementById('upgrades').textContent = totalUpgrades;
            document.getElementById('luck').textContent = (totalUpgrades * LUCK_PER_UPGRADE).toFixed(3);
            const secretLuckMultiplier = Math.min(1 + (totalUpgrades * SECRET_LUCK_PER_UPGRADE), MAX_SECRET_LUCK);
            document.getElementById('secretLuck').textContent = secretLuckMultiplier.toFixed(2);
            const variantChanceMultiplier = Math.min(1 + (totalUpgrades * VARIANT_CHANCE_PER_UPGRADE), MAX_VARIANT_CHANCE_MULTIPLIER);
            document.getElementById('variantChance').textContent = variantChanceMultiplier.toFixed(2);
            document.getElementById('upgradeCost').textContent = upgradeCost.toFixed(2);
            document.getElementById('inventoryCount').textContent = inventory.length;
            document.getElementById('inventoryMax').textContent = maxInventory;
            document.getElementById('ranksDiscovered').textContent = discoveredRanks.size;
            document.getElementById('totalRanks').textContent = TOTAL_RANKS;
            
            if (highestRoll > 0) {
                const rankInfo = getRankInfo(highestRoll);
                const rankClass = getRankClass(highestRoll);
                const displayName = applySecretRank(rankInfo.name);
                document.getElementById('rarest').innerHTML = 
                    `<span class="${rankClass}">${highestRoll.toFixed(6)} [${displayName}]</span>`;
            }
        }

        function updateInventoryDisplay() {
            const inventoryContent = document.getElementById('inventoryContent');
            if (inventory.length === 0) {
                inventoryContent.innerHTML = 'Empty';
            } else {
                inventoryContent.innerHTML = inventory.map((item, idx) => {
                    const rankClass = getRankClass(item.value);
                    const variantText = item.variant ? `<span style="color: ${item.variant.color}; font-weight: bold;">[${item.variant.name}]</span> ` : '';
                    return `<div class="inventory-item" onclick="removeFromInventory(${idx})">
                        #${item.index}: ${variantText}<span class="${rankClass}">${item.value.toFixed(6)} [${item.rank}]</span>
                    </div>`;
                }).join('');
            }
        }

        function updateIndexDisplay() {
            const indexContent = document.getElementById('indexContent');
            let html = '<div style="margin-bottom: 15px;"><strong>Normal Ranks:</strong></div>';
            
            RANK_TIERS.forEach(tier => {
                const discovered = discoveredRanks.has(tier.name);
                const rankClass = getRankClass((tier.min + tier.max) / 2);
                html += `<div class="index-item ${discovered ? 'discovered' : 'locked'}">
                    ${discovered ? `<span class="${rankClass}">${tier.name}</span>` : '???'}
                </div>`;
            });
            
            html += '<div style="margin: 15px 0;"><strong>Secret Ranks:</strong></div>';
            SECRET_RANKS.forEach(rank => {
                const discovered = discoveredRanks.has(rank);
                html += `<div class="index-item ${discovered ? 'discovered' : 'locked'}">
                    ${discovered ? `<span style="color: #ff69b4;">${rank}</span>` : '???'}
                </div>`;
            });
            
            indexContent.innerHTML = html;
        }

        function addToInventory(value, rank, index, variant = null) {
            if (inventory.length >= maxInventory) {
                addToTerminal('Inventory full! Buy upgrades to increase space.', true);
                return false;
            }
            inventory.push({ value, rank, index, variant });
            updateInventoryDisplay();
            updateStats();
            saveGame();
            return true;
        }

        function removeFromInventory(idx) {
            const item = inventory[idx];
            const variantText = item.variant ? `[${item.variant.name}] ` : '';
            addToTerminal(`Removed from inventory: #${item.index} ${variantText}${item.value.toFixed(6)} [${item.rank}]`, true);
            
            acceptedRolls.delete(item.index);
            
            const rollElement = document.getElementById(`roll-${item.index}`);
            if (rollElement) {
                rollElement.style.opacity = '1';
                rollElement.style.cursor = 'pointer';
                rollElement.onclick = function() { tryAddToInventory(item.value, item.rank, item.index, rollElement); };
                if (item.variant) {
                    rollElement.setAttribute('data-variant', JSON.stringify(item.variant));
                }
            }
            
            inventory.splice(idx, 1);
            updateInventoryDisplay();
            updateStats();
            saveGame();
        }

        function roll() {
            const rollResult = generateRoll();
            const result = rollResult.value;
            const variant = rollResult.variant;
            const rankInfo = getRankInfo(result);
            const rankNum = getRankNumber(result);
            const currencyGain = Math.pow(rankNum, 1.2);
            const rankClass = getRankClass(result);
            const displayName = applySecretRank(rankInfo.name);
            const currentIndex = rollIndex++;
            
            // Add to discovered ranks
            if (!discoveredRanks.has(displayName)) {
                discoveredRanks.add(displayName);
                addToTerminal(`🎉 NEW RANK DISCOVERED: ${displayName}!`, true);
                updateIndexDisplay();
            }
            
            currency += currencyGain;
            
            if (result > highestRoll) {
                highestRoll = result;
            }
            
            // Check if should stop auto roll
            const isSecretRank = SECRET_RANKS.includes(displayName);
            const shouldStopOnValue = autoStopThreshold > 0 && result >= autoStopThreshold;
            const shouldStopOnSecret = secretConfig && isSecretRank;
            
            if (autoRollInterval && (shouldStopOnValue || shouldStopOnSecret)) {
                toggleAutoRoll();
                const reason = shouldStopOnSecret ? `secret rank [${displayName}]` : `threshold (${result.toFixed(6)} ≥ ${autoStopThreshold})`;
                addToTerminal(`Auto-roll stopped: ${reason} detected!`, true);
            }
            
            const variantText = variant ? `<span style="color: ${variant.color}; font-weight: bold;">[${variant.name}]</span> ` : '';
            const variantDataAttr = variant ? `data-variant='${JSON.stringify(variant)}'` : '';
            
            addToTerminal(
                `#${currentIndex}: ${variantText}<span class="clickable-roll ${rankClass}" onclick="tryAddToInventory(${result}, '${displayName}', ${currentIndex}, this)" id="roll-${currentIndex}" ${variantDataAttr}>${result.toFixed(6)} [${displayName}]</span> (+${currencyGain.toFixed(2)} currency)`
            );
            
            updateStats();
            saveGame();
        }

        function tryAddToInventory(value, rank, index, element) {
            if (acceptedRolls.has(index)) {
                addToTerminal(`Roll #${index} has already been accepted!`, true);
                return;
            }
            
            let variant = null;
            if (element && element.dataset && element.dataset.variant) {
                try {
                    variant = JSON.parse(element.dataset.variant);
                } catch (e) {
                    console.error('Error parsing variant:', e);
                }
            }
            
            if (addToInventory(value, rank, index, variant)) {
                acceptedRolls.add(index);
                const variantText = variant ? `[${variant.name}] ` : '';
                addToTerminal(`Added to inventory: #${index} ${variantText}${value.toFixed(6)} [${rank}]`, true);
                
                const rollElement = document.getElementById(`roll-${index}`);
                if (rollElement) {
                    rollElement.style.opacity = '0.5';
                    rollElement.style.cursor = 'not-allowed';
                    rollElement.onclick = null;
                }
                
                saveGame();
            }
        }

        function toggleAutoRoll() {
            const btn = document.getElementById('autoRollBtn');
            if (autoRollInterval) {
                clearInterval(autoRollInterval);
                autoRollInterval = null;
                btn.textContent = 'Auto Roll';
                btn.classList.remove('active');
                addToTerminal('Auto-rolling stopped.', true);
            } else {
                autoStopThreshold = parseFloat(document.getElementById('autoStopThreshold').value) || 0;
                secretConfig = document.getElementById('secretConfig').checked;
                autoRollInterval = setInterval(roll, AUTO_ROLL_DELAY_MS);
                btn.textContent = 'Stop Auto Roll';
                btn.classList.add('active');
                let message = 'Auto-rolling started...';
                if (autoStopThreshold > 0) {
                    message += ` (stop at ≥${autoStopThreshold})`;
                }
                if (secretConfig) {
                    message += ` (stop on secret ranks)`;
                }
                addToTerminal(message, true);
            }
        }

        function buyUpgrade() {
            if (currency >= upgradeCost) {
                currency -= upgradeCost;
                totalUpgrades++;
                maxInventory += INVENTORY_PER_UPGRADE;
                const currentLuck = totalUpgrades * LUCK_PER_UPGRADE;
                const secretLuckMultiplier = Math.min(1 + (totalUpgrades * SECRET_LUCK_PER_UPGRADE), MAX_SECRET_LUCK);
                
                addToTerminal(
                    `Upgrade purchased! Total upgrades: ${totalUpgrades} | Luck: +${currentLuck.toFixed(3)} | Secret Luck: ${secretLuckMultiplier.toFixed(2)}x | Inventory space: ${maxInventory} | Currency: ${currency.toFixed(2)}`,
                    true
                );
                
                upgradeCost *= UPGRADE_COST_MULTIPLIER;
                addToTerminal(`Next upgrade cost: ${upgradeCost.toFixed(2)}`);
                
                updateStats();
                saveGame();
            } else {
                addToTerminal(
                    `Not enough currency! You have ${currency.toFixed(2)} but need ${upgradeCost.toFixed(2)}`,
                    true
                );
            }
        }

        function showRarest() {
            if (highestRoll === 0) {
                addToTerminal('No rolls yet!', true);
            } else {
                const rankInfo = getRankInfo(highestRoll);
                const rankClass = getRankClass(highestRoll);
                const displayName = applySecretRank(rankInfo.name);
                addToTerminal(
                    `Rarest roll: <span class="${rankClass}">${highestRoll.toFixed(6)} [${displayName}]</span>`,
                    true
                );
            }
        }

        function clearTerminal() {
            const terminal = document.getElementById('terminal');
            const welcomeMsg = terminal.querySelector('.welcome-message');
            terminal.innerHTML = '';
            if (welcomeMsg) {
                terminal.appendChild(welcomeMsg);
            }
        }

        function saveGame() {
            const gameState = {
                currency,
                totalUpgrades,
                upgradeCost,
                highestRoll,
                maxInventory,
                inventory,
                rollIndex,
                acceptedRolls: Array.from(acceptedRolls),
                discoveredRanks: Array.from(discoveredRanks)
            };
            localStorage.setItem('calisRNGGame', JSON.stringify(gameState));
        }

        function loadGame() {
            const saved = localStorage.getItem('calisRNGGame');
            if (saved) {
                try {
                    const gameState = JSON.parse(saved);
                    currency = gameState.currency || 0;
                    totalUpgrades = gameState.totalUpgrades || 0;
                    upgradeCost = gameState.upgradeCost || 50;
                    highestRoll = gameState.highestRoll || 0;
                    maxInventory = gameState.maxInventory || 10;
                    inventory = gameState.inventory || [];
                    rollIndex = gameState.rollIndex || 1;
                    acceptedRolls = new Set(gameState.acceptedRolls || []);
                    discoveredRanks = new Set(gameState.discoveredRanks || []);
                    
                    updateStats();
                    updateInventoryDisplay();
                    updateIndexDisplay();
                    addToTerminal('Game loaded!', true);
                } catch (e) {
                    console.error('Error loading game:', e);
                }
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'r' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                roll();
            }
        });

        const welcomeLine = document.createElement('div');
        welcomeLine.className = 'output-line welcome-message';
        welcomeLine.textContent = 'Welcome to calis RNG game!';
        document.getElementById('terminal').appendChild(welcomeLine);
        addToTerminal('Click rolls to add them to your inventory!');
        
        loadGame();
        updateIndexDisplay();
    </script>
</body>
